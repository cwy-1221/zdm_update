name: zdm_crawler_v2

on:
  #将下面两行代码取消注释
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      # 手动/调试运行入口. 执行内容与定时任务一致; 选择True时会立即尝试生成提交记录
      should_commit:
        description: '手动/调试运行时立即尝试生成提交记录'
        type: boolean
        default: False

concurrency:
  group: zdm-crawler-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: false
    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven
    # 安装Chrome和 ChromeDriver
    - name: Setup Chrome
      uses: browser-actions/setup-chrome@v2
      with:
        chrome-version: 145
        chromedriver-version: 145
        install-chromedriver: true
    - name: Update PATH
      run: |
        sudo ln -sf /opt/hostedtoolcache/setup-chrome/chromium/stable/x64/chrome /usr/bin/google-chrome
    # 将上次运行的缓存文件覆盖到本地
    - name: database cache restore
      uses: actions/cache@v4
      with:
        path: database_old.db
        # 每次运行都是唯一的key,避免缓存过期 (缓存总上限10GB, LRU过期策略)
        key: ${{ runner.os }}-database_old-${{ github.run_number }}
        # 兜底机制: 匹配符合这个前缀的最新缓存
        restore-keys: ${{ runner.os }}-database_old-
    - name: database cache copy
      id: db_copy
      run: |
        if [ -f database.db ]; then
          LAST_COUNT=$(sqlite3 database.db "SELECT COUNT(*) FROM ZDM;")
        else
          LAST_COUNT=0
        fi
        echo "last_count=$LAST_COUNT" >> $GITHUB_OUTPUT
        if [ -f database_old.db ]; then
          cp database_old.db database.db
        fi
        if [ -f database.db ]; then
          echo "Database before run:"
          sqlite3 database.db "SELECT COUNT(*) AS total, SUM(CASE WHEN pushed=1 THEN 1 ELSE 0 END) AS pushed, SUM(CASE WHEN pushed=0 THEN 1 ELSE 0 END) AS unpushed FROM ZDM;"
        fi
    # 打包项目
    - name: Build with Maven
      run: |
        mvn package
        cp ./target/zdm-0.0.1.jar ./zdm.jar
    - name: main logic
      env:
        #爬取数据时的最大翻页数量
        maxPageSize: 10
        # 点值的数量>minVoted,才会被推送,填0为都推送
        minVoted: 5
        # 评论的数量>minComments,才会被推送,填0为都推送
        minComments: 3
        # 优惠信息数量>MIN_PUSH_SIZE就会发邮件,否则积累到下一次触发任务再决定是否推送. 不建议填太小的数字,避免邮件太多了
        MIN_PUSH_SIZE: 5
        # 邮箱的smtp服务器地址(示例给出的是qq邮箱的配置,非qq邮箱需要进行修改)
        emailHost: smtp.qq.com
        # 邮箱smtp服务端口
        emailPort: 465
        # 接收优惠信息的邮箱 为空代表不进行邮箱推送
        emailAccount: ${{secrets.emailAccount}}
        # 接收优惠信息的邮箱的授权码 为空代表不进行邮箱推送
        emailPassword: ${{secrets.emailPassword}}
        # WxPusher极简推送模式的spt 为空代表不进行Wx推送
        spt: ${{ secrets.spt || vars.spt }}
        # true:下载阶段打印出详细信息(待推送的优惠信息列表,过滤时使用的黑白词),因文本量比较大,在调通项目后可以改为false
        detail: false
      run: java -jar zdm.jar
    # 检查数据库是否发生变化
    - name: check database changes
      id: commit_check
      run: |
        LAST_COUNT=${{ steps.db_copy.outputs.last_count }}
        CURRENT_COUNT=$(sqlite3 database.db "SELECT COUNT(*) FROM ZDM;")
        NEW_ROWS=$((CURRENT_COUNT - LAST_COUNT))
        echo "Last count: $LAST_COUNT , Current count: $CURRENT_COUNT , New rows: $NEW_ROWS"
        echo "Database after run:"
        sqlite3 database.db "SELECT COUNT(*) AS total, SUM(CASE WHEN pushed=1 THEN 1 ELSE 0 END) AS pushed, SUM(CASE WHEN pushed=0 THEN 1 ELSE 0 END) AS unpushed FROM ZDM;"
        if git diff --quiet -- database.db; then
          echo "should_commit=false" >> $GITHUB_OUTPUT
        else
          echo "should_commit=true" >> $GITHUB_OUTPUT
        fi
        cp database.db database_old.db
    - name: commit & push
      if: steps.commit_check.outputs.should_commit == 'true' || inputs.should_commit == 'true'
      env:
        GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
      run: |
        git config user.email "actions@github.com"
        git config user.name "GitHub Actions"
        git add database.db

        if git diff --cached --quiet -- database.db; then
          echo "No database changes to commit."
          exit 0
        fi

        if [ -z "$GIT_TOKEN" ]; then
          echo "GIT_TOKEN is not configured. Please add a repository secret named GIT_TOKEN with write access to this repository."
          exit 1
        fi

        git commit -m "update articles"
        git remote set-url origin "https://x-access-token:${GIT_TOKEN}@github.com/${{ github.repository }}.git"
        git push origin "HEAD:${GITHUB_REF_NAME}"
